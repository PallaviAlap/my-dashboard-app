<div class="container">

<h2>Sign In</h2>

<input
type="email"
placeholder="Email"
[(ngModel)]="email"
/>

<input
type="password"
placeholder="Password"
[(ngModel)]="password"
/>

<button (click)="login()">
Sign In
</button>

<p>
Don't have an account?
<a routerLink="/signup">Sign Up</a>
</p>

<button (click)="restoreBackup()" class="backup">
Restore Backup
</button>

</div>
